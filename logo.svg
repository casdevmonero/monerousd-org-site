<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- Outer rim gradient (3D metallic look) -->
    <linearGradient id="rimOuter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="20%" stop-color="#6a6a6a"/>
      <stop offset="50%" stop-color="#555"/>
      <stop offset="80%" stop-color="#444"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
    <!-- Inner rim highlight -->
    <linearGradient id="rimInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#707070"/>
      <stop offset="50%" stop-color="#505050"/>
      <stop offset="100%" stop-color="#404040"/>
    </linearGradient>
    <!-- Coin face gradient -->
    <radialGradient id="coinFace" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#4d4d4d"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </radialGradient>
    <!-- M gradient (orange) -->
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7941d"/>
      <stop offset="50%" stop-color="#f5851a"/>
      <stop offset="100%" stop-color="#e07517"/>
    </linearGradient>
    <!-- Shadow below coin -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="rgba(0,0,0,0.25)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <!-- Outer rim -->
  <circle cx="128" cy="128" r="122" fill="url(#rimOuter)" stroke="#333" stroke-width="2"/>
  <!-- Rim bevel -->
  <circle cx="128" cy="128" r="112" fill="url(#rimInner)"/>
  <!-- Inner coin face -->
  <circle cx="128" cy="128" r="102" fill="url(#coinFace)"/>
  <!-- Subtle inner ring -->
  <circle cx="128" cy="128" r="102" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- Monero M shape — thick, angular -->
  <polygon points="62,178 62,88 128,154 194,88 194,178 176,178 176,118 128,166 80,118 80,178"
           fill="url(#mGrad)"/>
  <!-- Bottom bar left -->
  <rect x="42" y="162" width="38" height="16" rx="2" fill="url(#mGrad)"/>
  <!-- Bottom bar right -->
  <rect x="176" y="162" width="38" height="16" rx="2" fill="url(#mGrad)"/>
</svg>
